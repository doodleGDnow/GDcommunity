<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDCommunity Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>💬 Community Chat</h1>

    <div class="chat-box">

        <div class="message">
            <strong>Pawsy:</strong> Welcome to GDCommunity!
        </div>

        <div class="message">
            <strong>DashPlayer:</strong> Anyone beat Bloodbath?
        </div>

        <div class="message">
            <strong>CubeMaster:</strong> Geometry Dash 2.2 is awesome!
        </div>

    </div>

    <div class="chat-input">

        <input
            type="text"
            placeholder="Login required to send messages..."
            class="input"
            disabled
        >

        <br><br>

        <button disabled>Send</button>

    </div>

    <p>
        🔒 Guests can read messages but must log in to chat.
    </p>

</div>

</body>
</html>

<script type="module">
import { auth } from "./js/firebase.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
    if (!user) {
        alert("You must login to chat 🔒");
    }
});
</script>

<div id="messages"></div>

<input id="messageInput" type="text">
<button id="sendBtn">Send</button>

<script type="module" src="js/chat.js"></script>

<input id="email" placeholder="email">
<input id="password" placeholder="password">
<input id="username" placeholder="username">
<button onclick="register()">Register</button>

<script type="module" src="register.js"></script>
