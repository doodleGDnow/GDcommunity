<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GDCommunity</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>🔑 Login</h1>

    <div class="info">

        <input type="text" placeholder="Username or Email" class="input">
        <br><br>

        <input type="password" placeholder="Password" class="input">
        <br><br>

        <button>Login</button>

        <br><br>

        <a href="register.html">
            Don't have an account?
        </a>

    </div>

</div>

</body>
</html>

<script type="module">
import { login, loginWithGoogle } from "./js/auth.js";

document.querySelector("button").onclick = async () => {
    const email = document.querySelectorAll("input")[0].value;
    const password = document.querySelectorAll("input")[1].value;

    try {
        await login(email, password);
        alert("Login successful 🎮");
        window.location.href = "chat.html";
    } catch (e) {
        alert(e.message);
    }
};
</script>

<button id="google">Login with Google</button>
<script type="module">
import { auth } from "./js/firebase.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
    if (!user) {
        alert("You must login to chat 🔒");
    }
});
</script>
